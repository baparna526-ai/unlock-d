version: '3.8'

services:
  # ── Node.js Backend ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unlockd_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  # ── React Frontend ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unlockd_frontend
    restart: unless-stopped
    ports:
      - "5173:80" # Map Nginx port 80 to 5173 to access at http://localhost:5173
    depends_on:
      - backend
